  <link rel="stylesheet" href="css/style.css?v=6" />

  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />

  <style>
    /* Grain texture overlay */
    .texture-overlay {
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      mix-blend-mode: multiply;
    }

    /*
      Project card number — large, bold, sits in the bottom-left of the image.
      In default state: white & semi-transparent (matches the grayscale tone).
      On hover: fully opaque white (the image itself goes colour, number pops).
      The number is positioned so it slightly overflows the bottom edge of the
      image container, exactly like the reference image.
    */
    .proj-num {
      position: absolute;
      bottom: -0.15em;
      right: 0.12em;          /* right-aligned, close to edge */
      font-family: 'Spline Sans', sans-serif;
      font-size: clamp(5.5rem, 9.9vw, 9.9rem);   /* 10% larger */
      font-weight: 700;
      line-height: 1;
      color: rgba(255,255,255,0.60);              /* 60% opacity */
      transition: color 500ms ease-in-out, opacity 500ms ease-in-out;
      pointer-events: none;
      z-index: 10;
      letter-spacing: -0.04em;
      width: max-content;
    }

    /* On hover (real pointers only — see touch fallback below): number
       becomes fully white and visible */
    @media (hover: hover) and (pointer: fine) {
      .group:hover .proj-num {
        color: rgba(255,255,255,0.95);
      }
    }

    /* Image: grayscale by default, full colour on hover — 500ms smooth */
    .proj-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: filter 500ms ease-in-out, transform 500ms ease-in-out;
    }
    @media (hover: hover) and (pointer: fine) {
      .group:hover .proj-img {
        filter: grayscale(0%);
        transform: scale(1.03);
      }
    }

    /* Dark gradient overlay fades in on hover for depth */
    .proj-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 500ms ease-in-out;
      pointer-events: none;
    }
    @media (hover: hover) and (pointer: fine) {
      .group:hover .proj-overlay {
        opacity: 1;
      }
    }

    /* Touch devices can't hover — show every card in its "revealed"
       state by default instead of leaving it permanently grayscale/dim. */
    @media not all and (hover: hover) {
      .proj-img { filter: grayscale(0%); }
      .proj-overlay { opacity: 1; }
      .proj-num { color: rgba(255,255,255,0.95); }
    }

    /* Caption text: black by default, brand-blue on hover */
    .proj-title {
      font-family: 'Spline Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #171818;
      transition: color 300ms ease-out;
    }
    .group:hover .proj-title {
      color: #6e86d6;
    }
  </style>
</head>
